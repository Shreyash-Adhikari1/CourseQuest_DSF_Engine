<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}CourseQuest{% endblock %}</title>

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#1A1A2E;
            --primary-light:#2C3E67;
            --accent:#4A90D9;
            --background:#F5F7FB;
            --card:#FFFFFF;
            --text:#1E293B;
            --muted:#64748B;
            --border:#E5E7EB;
            --shadow:0 8px 24px rgba(15,23,42,.06);
            --radius:16px;
        }

        body{
            font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
            background:var(--background);
            color:var(--text);
            line-height:1.6;
        }

        .navbar{
            background:var(--primary);
            color:white;
            height:72px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 40px;
            box-shadow:0 3px 12px rgba(0,0,0,.12);
        }

        .navbar h1{
            font-size:1.35rem;
            font-weight:700;
            letter-spacing:.3px;
        }

        .navbar a{
            color:rgba(255,255,255,.85);
            text-decoration:none;
            font-weight:500;
            transition:.25s;
        }

        .navbar a:hover{
            color:white;
        }

        .container{
            max-width:1280px;
            margin:35px auto;
            padding:0 30px;
        }

        .page-title{
            font-size:2rem;
            font-weight:700;
            color:var(--primary);
            margin-bottom:.35rem;
        }

        .page-subtitle{
            color:var(--muted);
            margin-bottom:2rem;
            font-size:.95rem;
        }

        .grid-2{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:24px;
        }

        .grid-3{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:24px;
        }

        .card{
            background:var(--card);
            border-radius:var(--radius);
            border:1px solid var(--border);
            padding:24px;
            margin-bottom:24px;
            box-shadow:var(--shadow);
            transition:.25s ease;
        }

        .card:hover{
            transform:translateY(-3px);
            box-shadow:0 14px 30px rgba(0,0,0,.08);
        }

        .card h2{
            font-size:1rem;
            color:var(--primary);
            margin-bottom:20px;
            font-weight:600;
        }

        .stat-number{
            font-size:2.8rem;
            font-weight:700;
            color:var(--primary);
        }

        .stat-label{
            color:var(--muted);
            margin-top:8px;
            font-size:.95rem;
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:10px 18px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            transition:.25s;
            border:none;
            cursor:pointer;
        }

        .btn-primary{
            background:var(--primary);
            color:white;
        }

        .btn-primary:hover{
            background:var(--primary-light);
        }

        .btn-secondary{
            background:#EEF2F7;
            color:var(--text);
        }

   table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#f8f9fb;
}

th{

    padding:16px;

    text-align:left;

    font-size:.8rem;

    text-transform:uppercase;

    letter-spacing:.08em;

    color:#666;

    font-weight:700;

    border-bottom:2px solid #ececec;

}

td{

    padding:16px;

    border-bottom:1px solid #f0f0f0;

    font-size:.95rem;

}

tbody tr{

    transition:.15s;

}

tbody tr:hover{

    background:#fafafa;

}

        .badge{
            display:inline-block;
            background:#EAF4FF;
            color:#2166C2;
            padding:6px 12px;
            border-radius:999px;
            font-size:.75rem;
            font-weight:600;
        }

        .tag{
            display:inline-block;
            padding:6px 14px;
            border-radius:999px;
            font-size:.8rem;
            margin:4px;
        }

        .tag-strength{
            background:#DDF5E5;
            color:#1E6B3A;
        }

        .tag-improvement{
            background:#FFF5D9;
            color:#8A6500;
        }

        canvas{
            max-height:320px;
        }

        .alert{
            padding:14px 18px;
            border-radius:10px;
            margin-bottom:18px;
            font-size:.9rem;
        }

        .alert-success{
            background:#DDF5E5;
            color:#166534;
        }

        .alert-error{
            background:#FEE2E2;
            color:#991B1B;
        }

        @media(max-width:900px){

            .grid-2,
            .grid-3{
                grid-template-columns:1fr;
            }

            .navbar{
                padding:0 20px;
            }

            .container{
                padding:0 18px;
            }

            .page-title{
                font-size:1.6rem;
            }
        }

    </style>

    {% block extra_styles %}{% endblock %}
</head>

<body>

<nav class="navbar">
    <h1>CourseQuest</h1>

    <a href="/dashboard/">← Back to Dashboard</a>
</nav>

<div class="container">

    {% if messages %}
        {% for message in messages %}

            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>

        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

</div>

{% block extra_scripts %}{% endblock %}

</body>
</html>
